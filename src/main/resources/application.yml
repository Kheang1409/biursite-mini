spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:biursite}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
  thymeleaf:
    cache: ${THYMELEAF_CACHE:true}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
server:
  port: ${SERVER_PORT:8080}
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.biursite: ${LOG_LEVEL_APP:INFO}
