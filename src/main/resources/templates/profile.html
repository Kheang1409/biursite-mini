<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head th:replace="~{fragments/head :: head('Profile - BiUrSite')}"></head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased"
  >
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="flex-1">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div
          class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-8 mb-8"
        >
          <div class="flex items-center gap-6 mb-8">
            <div
              class="w-20 h-20 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/25"
            >
              <i class="fas fa-user text-3xl text-white"></i>
            </div>
            <div>
              <h1
                class="text-2xl font-bold text-gray-900 dark:text-gray-100"
                th:text="${user.username}"
              >
                Username
              </h1>
              <p
                class="text-gray-500 dark:text-gray-400"
                th:text="${user.email}"
              >
                email@example.com
              </p>
            </div>
          </div>

          <div
            th:if="${success}"
            class="mb-6 flex items-center gap-3 rounded-lg bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-700 p-4 text-green-800 dark:text-green-200"
          >
            <i class="fas fa-check-circle text-lg"></i>
            <span th:text="${success}"></span>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div
              class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 p-5 rounded-xl border border-gray-200 dark:border-gray-700"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-lg bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center"
                >
                  <i
                    class="fas fa-shield-alt text-indigo-600 dark:text-indigo-400"
                  ></i>
                </div>
                <div>
                  <p
                    class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide"
                  >
                    Role
                  </p>
                  <p
                    class="font-semibold text-gray-900 dark:text-gray-100"
                    th:text="${user.role}"
                  >
                    ROLE_USER
                  </p>
                </div>
              </div>
            </div>
            <div
              class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 p-5 rounded-xl border border-gray-200 dark:border-gray-700"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-lg bg-green-100 dark:bg-green-900/30 flex items-center justify-center"
                >
                  <i
                    class="fas fa-calendar text-green-600 dark:text-green-400"
                  ></i>
                </div>
                <div>
                  <p
                    class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide"
                  >
                    Member Since
                  </p>
                  <time
                    class="font-semibold text-gray-900 dark:text-gray-100"
                    th:text="${#temporals.format(user.createdAt, 'MMM d, yyyy')}"
                  ></time>
                </div>
              </div>
            </div>
          </div>

          <div class="border-t border-gray-200 dark:border-gray-700 pt-8">
            <h2
              class="text-lg font-semibold text-gray-900 dark:text-gray-100 mb-5 flex items-center gap-2"
            >
              <i class="fas fa-edit text-indigo-600 dark:text-indigo-400"></i>
              Update Profile
            </h2>
            <form
              th:action="@{/profile}"
              th:object="${updateUserRequest}"
              method="post"
              class="space-y-5"
            >
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label
                    for="username"
                    class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1"
                    >Username</label
                  >
                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                    >
                      <i
                        class="fas fa-user text-gray-400 dark:text-gray-500"
                      ></i>
                    </div>
                    <input
                      type="text"
                      id="username"
                      th:field="*{username}"
                      required
                      class="block w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                  </div>
                  <span
                    class="mt-1 text-sm text-red-600 dark:text-red-400 flex items-center gap-1"
                    th:if="${#fields.hasErrors('username')}"
                  >
                    <i class="fas fa-exclamation-circle text-xs"></i>
                    <span th:errors="*{username}"></span>
                  </span>
                </div>
                <div>
                  <label
                    for="email"
                    class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1"
                    >Email</label
                  >
                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                    >
                      <i
                        class="fas fa-envelope text-gray-400 dark:text-gray-500"
                      ></i>
                    </div>
                    <input
                      type="email"
                      id="email"
                      th:field="*{email}"
                      required
                      class="block w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                    />
                  </div>
                  <span
                    class="mt-1 text-sm text-red-600 dark:text-red-400 flex items-center gap-1"
                    th:if="${#fields.hasErrors('email')}"
                  >
                    <i class="fas fa-exclamation-circle text-xs"></i>
                    <span th:errors="*{email}"></span>
                  </span>
                </div>
              </div>
              <div>
                <label
                  for="password"
                  class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1"
                >
                  New Password
                  <span class="text-gray-400 font-normal"
                    >(leave blank to keep current)</span
                  >
                </label>
                <div class="relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <i class="fas fa-lock text-gray-400 dark:text-gray-500"></i>
                  </div>
                  <input
                    type="password"
                    id="password"
                    th:field="*{password}"
                    placeholder="Enter new password"
                    class="block w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                  />
                </div>
              </div>
              <button
                type="submit"
                class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 inline-flex items-center gap-2"
              >
                <i class="fas fa-save"></i> Save Changes
              </button>
            </form>
          </div>
        </div>

        <div
          class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-8"
        >
          <h2
            class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-6 flex items-center gap-3"
          >
            <div
              class="w-10 h-10 rounded-lg bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center"
            >
              <i
                class="fas fa-file-alt text-indigo-600 dark:text-indigo-400"
              ></i>
            </div>
            Your Posts
          </h2>

          <div th:if="${#lists.isEmpty(userPosts)}" class="text-center py-12">
            <div
              class="w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center mx-auto mb-4"
            >
              <i class="fas fa-inbox text-2xl text-gray-400"></i>
            </div>
            <p class="text-gray-600 dark:text-gray-300 mb-4">
              You haven't written any posts yet.
            </p>
            <a
              th:href="@{/posts}"
              class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-500/25"
            >
              <i class="fas fa-plus"></i> Create Your First Post
            </a>
          </div>

          <div class="space-y-4" th:if="${not #lists.isEmpty(userPosts)}">
            <article
              th:each="post : ${userPosts}"
              class="group border border-gray-200 dark:border-gray-700 rounded-xl p-5 hover:shadow-lg hover:border-indigo-200 dark:hover:border-indigo-800 transition-all duration-200"
            >
              <div class="flex items-start justify-between">
                <div class="flex-1">
                  <h3
                    class="font-semibold text-gray-900 dark:text-gray-100 mb-2 text-lg"
                  >
                    <a
                      th:href="@{/posts/{id}(id=${post.id})}"
                      th:text="${post.title}"
                      class="hover:text-indigo-600 dark:hover:text-indigo-400 transition"
                    ></a>
                  </h3>
                  <div th:if="${post.banned}" class="mt-2">
                    <span
                      class="px-2 py-0.5 text-xs rounded-full bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300"
                      >BANNED</span
                    >
                    <p class="mt-2 text-sm text-red-600 dark:text-red-400">
                      Reason:
                      <span
                        th:text="${post.banReason ?: 'No reason provided'}"
                      ></span>
                    </p>
                  </div>
                  <div
                    class="flex items-center gap-4 text-sm text-gray-500 dark:text-gray-400"
                  >
                    <span class="flex items-center gap-1">
                      <i class="fas fa-calendar text-gray-400"></i>
                      <time
                        th:text="${#temporals.format(post.createdAt, 'MMM d, yyyy')}"
                      ></time>
                    </span>
                    <span
                      th:if="${post.updatedAt != null && post.updatedAt != post.createdAt}"
                      class="flex items-center gap-1"
                    >
                      <i class="fas fa-sync text-gray-400"></i>
                      <span
                        >Edited
                        <time
                          th:text="${#temporals.format(post.updatedAt, 'MMM d, yyyy')}"
                        ></time
                      ></span>
                    </span>
                  </div>
                </div>
                <div
                  class="flex gap-2 ml-4 opacity-0 group-hover:opacity-100 transition-opacity"
                >
                  <a
                    th:href="@{/posts/{id}/edit(id=${post.id})}"
                    class="p-2 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/50 transition"
                    title="Edit"
                  >
                    <i class="fas fa-edit"></i>
                  </a>
                  <form
                    th:action="@{/posts/{id}/delete(id=${post.id})}"
                    method="post"
                    class="inline"
                    onsubmit="return confirm('Delete this post?');"
                  >
                    <button
                      type="submit"
                      class="p-2 rounded-lg bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/50 transition"
                      title="Delete"
                    >
                      <i class="fas fa-trash-alt"></i>
                    </button>
                  </form>
                </div>
              </div>
            </article>
          </div>
        </div>
      </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </body>
</html>
