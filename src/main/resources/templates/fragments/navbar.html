<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  lang="en"
>
  <body>
    <nav
      th:fragment="navbar"
      class="sticky top-0 z-50 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800"
    >
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center">
            <a th:href="@{/}" class="flex items-center gap-3 group">
              <img
                th:src="@{/images/icon.png}"
                alt="BiUrSite"
                class="h-8 w-8 rounded-lg shadow-sm group-hover:shadow-md transition-shadow duration-200"
              />
              <span
                class="text-xl font-bold text-gray-900 dark:text-white hidden sm:block"
                >BiUrSite</span
              >
            </a>
          </div>

          <div class="hidden md:flex items-center gap-1">
            <a
              th:href="@{/posts}"
              class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              ><i class="fas fa-newspaper mr-2"></i>Feed</a
            >
            <a
              sec:authorize="isAuthenticated()"
              th:href="@{/profile}"
              class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              ><i class="fas fa-user mr-2"></i>Profile</a
            >
            <a
              sec:authorize="hasRole('ADMIN')"
              th:href="@{/admin/users}"
              class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              ><i class="fas fa-users-cog mr-2"></i>Admin</a
            >
          </div>

          <div class="flex items-center gap-2 sm:gap-3">
            <button
              type="button"
              onclick="toggleTheme()"
              aria-label="Toggle dark mode"
              class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-white transition-colors duration-200"
            >
              <i id="theme-icon-sun" class="fas fa-sun text-lg hidden"></i>
              <i id="theme-icon-moon" class="fas fa-moon text-lg"></i>
            </button>

            <span
              sec:authorize="!isAuthenticated()"
              class="flex items-center gap-2"
            >
              <a
                th:href="@{/login}"
                class="px-4 py-2 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
                >Sign in</a
              >
              <a
                th:href="@{/register}"
                class="px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition-colors duration-200 shadow-sm hover:shadow-md"
                >Get Started</a
              >
            </span>

            <span
              sec:authorize="isAuthenticated()"
              class="flex items-center gap-2 sm:gap-3"
            >
              <div
                class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-gray-100 dark:bg-gray-800 rounded-lg"
              >
                <div
                  class="w-6 h-6 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-semibold"
                >
                  <span
                    sec:authentication="name"
                    class="hidden"
                    id="auth-username"
                  ></span>
                  <script>
                    document.addEventListener("DOMContentLoaded", function () {
                      const usernameEl =
                        document.getElementById("auth-username");
                      const avatarEl = document.getElementById(
                        "user-avatar-initial",
                      );
                      if (usernameEl && avatarEl) {
                        avatarEl.textContent = usernameEl.textContent
                          .charAt(0)
                          .toUpperCase();
                      }
                    });
                  </script>
                  <span id="user-avatar-initial">U</span>
                </div>
                <span
                  class="text-sm font-medium text-gray-700 dark:text-gray-200"
                  sec:authentication="name"
                  >User</span
                >
              </div>

              <form th:action="@{/logout}" method="post" class="inline">
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button
                  type="submit"
                  aria-label="Logout"
                  class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-600 dark:hover:text-red-400 transition-colors duration-200"
                  title="Sign out"
                >
                  <i class="fas fa-sign-out-alt"></i>
                </button>
              </form>
            </span>

            <button
              type="button"
              onclick="toggleMobileMenu()"
              class="md:hidden p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              aria-label="Toggle menu"
            >
              <i id="mobile-menu-icon" class="fas fa-bars text-lg"></i>
            </button>
          </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden pb-4">
          <div
            class="flex flex-col gap-1 pt-2 border-t border-gray-200 dark:border-gray-800"
          >
            <a
              th:href="@{/posts}"
              class="px-4 py-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              ><i class="fas fa-newspaper mr-3 w-5 text-center"></i>Feed</a
            >
            <a
              sec:authorize="isAuthenticated()"
              th:href="@{/profile}"
              class="px-4 py-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              ><i class="fas fa-user mr-3 w-5 text-center"></i>Profile</a
            >
            <a
              sec:authorize="hasRole('ADMIN')"
              th:href="@{/admin/users}"
              class="px-4 py-3 rounded-lg text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
              ><i class="fas fa-users-cog mr-3 w-5 text-center"></i>Admin</a
            >
          </div>
        </div>
      </div>

      <script>
        function toggleMobileMenu() {
          const menu = document.getElementById("mobile-menu");
          const icon = document.getElementById("mobile-menu-icon");
          menu.classList.toggle("hidden");
          if (menu.classList.contains("hidden")) {
            icon.classList.remove("fa-times");
            icon.classList.add("fa-bars");
          } else {
            icon.classList.remove("fa-bars");
            icon.classList.add("fa-times");
          }
        }
      </script>
    </nav>
  </body>
</html>
