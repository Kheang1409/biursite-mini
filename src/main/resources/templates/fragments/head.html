<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BiUrSite - Share your stories and connect with others"
    />
    <title th:text="${title}">BiUrSite</title>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
    />

    <!-- Tailwind CDN + config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Theme initialization (runs immediately) -->
    <script>
      (function () {
        function getThemePreference() {
          const stored = localStorage.getItem("theme");
          if (stored === "dark" || stored === "light") return stored;
          return window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        function applyTheme(theme) {
          const html = document.documentElement;
          html.classList.remove("dark", "light");
          if (theme === "dark") html.classList.add("dark");
          console.log(
            "Theme applied:",
            theme,
            "| HTML classes:",
            html.className,
          );
        }
        applyTheme(getThemePreference());
        window.toggleTheme = function () {
          const html = document.documentElement;
          const isDark = html.classList.contains("dark");
          const newTheme = isDark ? "light" : "dark";
          html.classList.add("transitioning");
          applyTheme(newTheme);
          localStorage.setItem("theme", newTheme);
          updateThemeIcons(newTheme === "dark");
          setTimeout(() => html.classList.remove("transitioning"), 300);
        };
        window.updateThemeIcons = function (isDark) {
          const sunIcon = document.getElementById("theme-icon-sun");
          const moonIcon = document.getElementById("theme-icon-moon");
          if (sunIcon && moonIcon) {
            sunIcon.classList.toggle("hidden", !isDark);
            moonIcon.classList.toggle("hidden", isDark);
          }
        };
        document.addEventListener("DOMContentLoaded", function () {
          updateThemeIcons(document.documentElement.classList.contains("dark"));
        });
      })();
    </script>

    <!-- Custom minimal CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="icon" type="image/png" th:href="@{/images/icon.png}" />
    <link rel="shortcut icon" th:href="@{/images/icon.png}" />
  </head>
</html>
