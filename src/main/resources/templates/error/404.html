<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head
    th:replace="~{fragments/head :: head('404 Not Found - BiUrSite')}"
  ></head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased"
  >
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="flex-1 flex items-center justify-center px-4 py-16">
      <div class="max-w-lg w-full text-center">
        <div class="mb-8">
          <div
            class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gray-100 dark:bg-gray-800 mb-6"
          >
            <i
              class="fas fa-search text-4xl text-gray-400 dark:text-gray-500"
            ></i>
          </div>
        </div>
        <h1
          class="text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600 mb-4"
        >
          404
        </h1>
        <h2
          class="text-2xl font-semibold text-gray-900 dark:text-gray-100 mb-3"
        >
          Page not found
        </h2>
        <p class="text-gray-600 dark:text-gray-300 mb-8 max-w-md mx-auto">
          Sorry, we couldn't find the page you're looking for. Perhaps you've
          mistyped the URL or the page has been moved.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a
            th:href="@{/}"
            class="inline-flex items-center justify-center px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition font-medium shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40"
          >
            <i class="fas fa-home mr-2"></i> Go Home
          </a>
          <a
            th:href="@{/posts}"
            class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition font-medium"
          >
            <i class="fas fa-newspaper mr-2"></i> View Posts
          </a>
        </div>
      </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </body>
</html>
