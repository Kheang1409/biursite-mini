name: CI

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run tests
        run: mvn -B -DskipTests=false clean verify

      - name: Dependency vulnerability scan (OWASP Dependency-Check)
        run: |
          mvn org.owasp:dependency-check-maven:8.4.1:check -Dformat=ALL || true

      - name: Build Docker image
        run: |
          docker build -t biursite:${{ github.sha }} .
